# Pulls reviewed translations from Lokalise and opens a PR (e.g. public/locales/de/*.json).
#
# Design (post human-review workflow):
# - Runs on a weekly schedule (Mon 14:00 UTC). Picks up everything reviewers approved that week.
# - DECOUPLED from push. Pushes no longer trigger an immediate pull — we wait for humans.
# - filter_data: ["reviewed_only"] ensures only approved translations are exported.
# - Manual dispatch (workflow_dispatch) available for ad-hoc pulls and demos.
#
# Docs:
# - https://github.com/lokalise/lokalise-pull-action
# - https://developers.lokalise.com/reference/download-files (filter_data values)
name: Pull reviewed translations from Lokalise

on:
  workflow_dispatch:
  schedule:
    # Weekly: Monday 14:00 UTC (09:00 Toronto / 15:00 Madrid). Adjust as needed.
    - cron: '0 14 * * 1'

concurrency:
  group: lokalise-pull-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Pull reviewed translations from Lokalise
        uses: lokalise/lokalise-pull-action@v5.2.0
        with:
          api_token: ${{ secrets.LOKALISE_API_TOKEN }}
          project_id: ${{ vars.LOKALISE_PROJECT_ID }}
          base_lang: en
          translations_path: public/locales
          file_format: json
          file_ext: json
          skip_include_tags: true
          # filter_data: ["reviewed_only"] means only translations that have
          # passed the Lokalise review stage are exported. Unreviewed MT stays
          # in Lokalise until a human approves it.
          additional_params: >
            {
              "indentation": "2sp",
              "export_empty_as": "skip",
              "export_sort": "a_z",
              "replace_breaks": false,
              "filter_data": ["reviewed_only"]
            }
          pr_title: 'Lokalise: reviewed translations update'
          pr_body: |
            Automated weekly pull of **reviewed** translations from Lokalise (`lokalise-pull-action`).

            Only translations that passed the human-review workflow are included.
            Unreviewed machine translations remain in Lokalise until a reviewer approves them.

            - Review JSON under `public/locales/` before merge.
            - For manual/ad-hoc pulls, re-run this workflow via **Actions → Run workflow**.
