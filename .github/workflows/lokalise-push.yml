# Uploads changed English JSON from public/locales/en/ to Lokalise (base language only).
# Pair with: Automations (MT/AI) + Workflows in the Lokalise project UI, then lokalise-pull.yml.
# Docs: https://developers.lokalise.com/docs/github-actions
name: Push English locales to Lokalise

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'public/locales/en/**/*.json'

concurrency:
  group: lokalise-push-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Debug – confirm secrets are set
        run: |
          echo "PROJECT_ID length: ${#PID}"
          echo "API_TOKEN set: $([ -n "$TOK" ] && echo yes || echo no)"
        env:
          PID: ${{ vars.LOKALISE_PROJECT_ID }}
          TOK: ${{ secrets.LOKALISE_API_TOKEN }}

      - name: Push to Lokalise
        uses: lokalise/lokalise-push-action@v5.2.0
        with:
          api_token: ${{ secrets.LOKALISE_API_TOKEN }}
          project_id: ${{ vars.LOKALISE_PROJECT_ID }}
          base_lang: en
          translations_path: public/locales
          file_ext: json
